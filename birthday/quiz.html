<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Memory Quiz ❤️</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/quiz.css">

</head>

<body>

    <!-- Floating Hearts -->
    <div class="hearts">
        <span>❤</span>
        <span>❤</span>
        <span>❤</span>
        <span>❤</span>
        <span>❤</span>
        <span>❤</span>
        <span>❤</span>
        <span>❤</span>
    </div>

    <!-- Background Glow -->
    <div class="bg-glow glow1"></div>
    <div class="bg-glow glow2"></div>

    <!-- Quiz Card -->
  <main class="quiz-container">

    <div class="quiz-card" id="quizCard">

        <div id="startScreen">

            <div class="emoji">❤️</div>

            <h1>Memory Quiz</h1>

            <p class="subtitle">

                Before you open your birthday surprise,
                let's see how much you remember about us.

            </p>

            <button id="startBtn">

                Start Quiz

            </button>

        </div>

        <div id="quizScreen" style="display:none;">

            <div class="progress">

                <div id="progressBar"></div>

            </div>

            <div class="questionNumber" id="questionNumber">

                Question 1 / 5

            </div>

            <h2 id="questionText"></h2>

            <div id="answerContainer"></div>

            <button id="nextBtn" style="display:none;">

                Next →

            </button>

        </div>

        <div id="finishScreen" style="display:none;">

            <div class="emoji">

                🎁

            </div>

            <h1>

                Congratulations!

            </h1>

            <p class="subtitle">

                Semua jawaban benar kok, karena kamu gapernah salah dimata aku.

            </p>

            <button id="giftBtn">

                Open My Gift ❤️

            </button>

        </div>

    </div>

</main>

    <script src="js/quiz.js"></script>

</body>

</html>
